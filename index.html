<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chatbot Showcase</title>
    <style>
        /* 简单样式，让页面更美观 */
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .chatbot-container {
            margin-top: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>My Hugging Face Chatbot</h1>
    <p>这是我在 Hugging Face 上部署的 Chatbot，已嵌入到 GitHub Pages 中。</p>

    <div class="chatbot-container">
        <!-- 核心：嵌入你的 Hugging Face Chatbot -->
        <gradio-app 
            src="https://nanguo515-slices.hf.space" 
            theme-mode="light"
            embed="true"
        ></gradio-app>
    </div>

    <!-- 引入最新版 Gradio 嵌入脚本（解决版本兼容问题） -->
    <script type="module" src="https://gradio.app/gradio.js"></script>
</body>
</html>
